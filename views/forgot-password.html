<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="../js/api.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-sm border border-gray-100 animate-slide-up relative overflow-hidden">

        <!-- Decorative blob -->
        <div class="absolute -top-16 -right-16 w-32 h-32 rounded-full opacity-10 theme-bg-update"
            style="background-color: var(--primary, #10B981);"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-3xl mb-4 theme-text-update theme-bg-light"
                style="color: var(--primary, #10B981); background-color: var(--primary-light, #D1FAE5);">
                <i class="fa-solid fa-envelope-open-text"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Forgot Password?</h1>
            <p class="text-sm text-gray-500 mt-2">Enter your email address to receive a password reset link.</p>
        </div>

        <form class="flex flex-col gap-4 relative z-10" id="forgot-password-form">
            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="email">Email</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email"
                        class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition"
                        placeholder="you@example.com" required>
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full py-3 mt-4 text-white font-bold rounded-xl shadow-md transform transition hover:-translate-y-0.5 active:translate-y-0 theme-bg-update flex justify-center items-center gap-2"
                style="background-color: var(--primary, #10B981);">
                <span>Send Reset Link</span>
            </button>
            
            <div id="status-message" class="hidden mt-4 p-3 rounded-xl text-sm text-center"></div>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600 relative z-10">
            Remember your password?
            <a href="login.html" class="font-bold theme-text-update" style="color: var(--primary, #10B981);">Back to Login</a>
        </p>
    </div>

    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = localStorage.getItem('theme') || 'green';
            updateThemeColors(currentTheme);

            document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                if (!email) return;

                const submitBtn = document.getElementById('submit-btn');
                const statusMsg = document.getElementById('status-message');
                const originalBtnText = submitBtn.innerHTML;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
                statusMsg.classList.add('hidden');

                try {
                    const { data, error } = await window.apiClient.post('/auth/forgot-password', { email });
                    
                    statusMsg.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200');
                    if (!error) {
                        statusMsg.classList.add('bg-green-50', 'text-green-600', 'border', 'border-green-200');
                        statusMsg.innerText = data.message || 'Password reset link sent to your email!';
                        document.getElementById('email').value = '';
                    } else {
                        statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                        statusMsg.innerText = error.message || error || 'Failed to send reset link.';
                    }
                } catch (err) {
                    statusMsg.classList.remove('hidden');
                    statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                    statusMsg.innerText = 'Network error. Please try again.';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            });
        });

        function updateThemeColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const primaryLight = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            
            document.documentElement.style.setProperty('--primary', primary);
            document.documentElement.style.setProperty('--primary-light', primaryLight);
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            document.querySelectorAll('.theme-text-update').forEach(el => el.style.color = primary);
            document.querySelectorAll('.theme-bg-light').forEach(el => el.style.backgroundColor = primaryLight);
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(`focus:ring-${theme === 'blue' ? 'blue' : 'green'}-500`);
            });
        }
    </script>
</body>
</html>
