<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/Logo%20Xhabit.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Habit - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">

        tailwind.config = {

            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' },
                        blue: { 500: '#5BA4C9', 600: '#0284C7' }
                    }

            }
        }
    </script>
    <style>
        .category-btn.active span {
            color: white;
        }

            background-color: transparent;

            opacity: 1;

</head>
<body class="font-sans text-gray-800">
        <!-- Desktop Sidebar -->

        <!-- Nav items -->

                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="chatbot.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">

            <a href="calendar.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">

                <span class="text-[10px] font-medium">Calendar</span>

                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>

            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-regular fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>
        
        <!-- Add Button -->
        <div class="mb-4">
            <a href="add_habit.html" class="w-12 h-12 bg-emerald-400 text-white rounded-full flex items-center justify-center text-xl shadow-lg hover:scale-105 hover:bg-emerald-500 transition-all">

    <!-- Main Content -->
    <main class="main-content-wrapper p-8 flex gap-10 w-full overflow-y-auto">
        <!-- Left Column -->
        <div class="w-7/12 flex flex-col gap-6 pl-4">
            
            <!-- Header -->
            <header class="flex items-center gap-4 animate-slide-up mt-4 bg-white/50 backdrop-blur rounded-[2rem] p-6 shadow-sm">
                <a href="index.html" class="w-12 h-12 rounded-full flex items-center justify-center text-gray-700 hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 transition focus:outline-none">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                </a>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Edit Habit</h1>
            </header>

            <div class="bg-white/80 backdrop-blur rounded-[2rem] p-8 shadow-sm border border-gray-100/50 flex flex-col gap-8 mb-8">
                
                <!-- Category Options -->
                <section>
                    <h2 class="text-xl font-bold text-gray-900 mb-6">Select Category</h2>
                    <div class="grid grid-cols-5 gap-4" id="category-container">
                        <!-- Art -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="art">
                            <div class="w-12 h-12 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-palette"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Art</span>
                        </button>
                        <!-- Study -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="study">
                            <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-book"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Study</span>
                        </button>
                        <!-- Entertainment -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="entertainment">
                            <div class="w-12 h-12 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-gamepad"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Entertain</span>
                        </button>
                        <!-- Meditation -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="meditation">
                            <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-spa"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Meditate</span>
                        </button>
                        <!-- Finance -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="finance">
                            <div class="w-12 h-12 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-wallet"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Finance</span>
                        </button>
                        <!-- Sport -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="sport">
                            <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-basketball"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Sport</span>
                        </button>
                        <!-- Health -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="health">
                            <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-heart-pulse"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Health</span>
                        </button>
                        <!-- Work -->
                        <button type="button" class="category-btn bg-white border border-gray-200 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="work">
                            <div class="w-12 h-12 rounded-full bg-gray-100 text-gray-700 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-briefcase"></i></div>
                            <span class="text-sm font-bold text-gray-700 transition-colors">Work</span>
                        </button>
                        <!-- Custom -->
                        <button type="button" class="category-btn bg-white border border-dashed border-gray-300 rounded-2xl py-4 px-2 flex flex-col items-center justify-center gap-3 shadow-sm transition hover:bg-gray-50 focus:outline-none" data-cat="custom">
                            <div class="w-12 h-12 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center text-xl transition-colors"><i class="fa-solid fa-plus"></i></div>
                            <span class="text-sm font-bold text-gray-500 transition-colors">Custom</span>
                        </button>
                    </div>
                    
                    <!-- Custom Category Inputs (Hidden by default) -->
                    <div id="custom-category-details" class="mt-6 p-6 bg-gray-50 rounded-2xl shadow-inner border border-gray-200 hidden flex-col gap-6">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2" for="custom-cat-name">Custom Category Name</label>
                            <input type="text" id="custom-cat-name" class="w-full px-5 py-4 bg-white border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm" placeholder="e.g., Pet Care">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-3">Select Custom Icon</label>
                            <div class="flex flex-wrap gap-4" id="custom-icon-selector">
                                <button type="button" class="icon-btn active w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-paw"><i class="fa-solid fa-paw"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-music"><i class="fa-solid fa-music"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-plane"><i class="fa-solid fa-plane"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-camera"><i class="fa-solid fa-camera"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-utensils"><i class="fa-solid fa-utensils"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-bicycle"><i class="fa-solid fa-bicycle"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-seedling"><i class="fa-solid fa-seedling"></i></button>
                                <button type="button" class="icon-btn w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm border border-gray-200 text-gray-600 hover:bg-gray-50 focus:outline-none transition-colors text-lg" data-icon="fa-star"><i class="fa-solid fa-star"></i></button>
                            </div>
                        </div>
                    </div>
                </section>

                <hr class="border-gray-100">

                <!-- Evaluation Method -->
                <section>
                    <h2 class="text-xl font-bold text-gray-900 mb-6">How do you want to evaluate your progress?</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <label class="relative flex flex-col items-center p-6 bg-white rounded-2xl shadow-sm border border-gray-200 cursor-pointer evaluation-option transition-all border-container text-center hover:bg-gray-50">
                            <input type="radio" name="evaluation" value="checklist" class="peer sr-only" checked>
                            <div class="w-14 h-14 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-2xl mb-4 transition-all shadow-sm">
                                <i class="fa-solid fa-list-check"></i>
                            </div>
                            <h3 class="font-bold text-base text-gray-900">Checklist</h3>
                            <p class="text-xs text-gray-500 mt-2 mb-4">Completed or not</p>
                            <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center border-target transition-all mt-auto bg-white">
                                <div class="radio-inner w-3 h-3 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                            </div>
                        </label>

                        <label class="relative flex flex-col items-center p-6 bg-white rounded-2xl shadow-sm border border-gray-200 cursor-pointer evaluation-option transition-all border-container text-center hover:bg-gray-50">
                            <input type="radio" name="evaluation" value="numeric" class="peer sr-only">
                            <div class="w-14 h-14 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center text-2xl mb-4 transition-all shadow-sm">
                                <i class="fa-solid fa-hashtag"></i>
                            </div>
                            <h3 class="font-bold text-base text-gray-900">Numeric Value</h3>
                            <p class="text-xs text-gray-500 mt-2 mb-4">Track amounts</p>
                            <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center border-target transition-all mt-auto bg-white">
                                <div class="radio-inner w-3 h-3 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                            </div>
                        </label>

                        <label class="relative flex flex-col items-center p-6 bg-white rounded-2xl shadow-sm border border-gray-200 cursor-pointer evaluation-option transition-all border-container text-center hover:bg-gray-50">
                            <input type="radio" name="evaluation" value="timer" class="peer sr-only">
                            <div class="w-14 h-14 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-2xl mb-4 transition-all shadow-sm">
                                <i class="fa-solid fa-stopwatch"></i>
                            </div>
                            <h3 class="font-bold text-base text-gray-900">Timer</h3>
                            <p class="text-xs text-gray-500 mt-2 mb-4">Track time spent</p>
                            <div class="w-6 h-6 rounded-full border-2 border-gray-300 flex items-center justify-center border-target transition-all mt-auto bg-white">
                                <div class="radio-inner w-3 h-3 rounded-full bg-[var(--primary)] opacity-0 transition-opacity theme-bg-update"></div>
                            </div>
                        </label>
                    </div>

                    <!-- Evaluation Preview Widget -->
                    <div id="eval-preview" class="mt-6 hidden">
                        <!-- Numeric Preview -->
                        <div id="numeric-preview" class="hidden p-6 bg-gray-50 rounded-2xl shadow-inner border border-gray-200">
                            <p class="text-sm font-bold text-gray-700 mb-4 uppercase tracking-wide">Counter Preview</p>
                            <div class="flex items-center justify-between mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                <span class="text-base font-bold text-gray-700">Your progress</span>
                                <div class="flex items-center gap-4">
                                    <!-- Minus button -->
                                    <button type="button" id="preview-minus"
                                        class="w-10 h-10 rounded-full border-2 flex items-center justify-center text-base transition-colors bg-white shadow-sm"
                                        style="border-color: var(--primary); color: var(--primary);"
                                        onmouseenter="this.style.backgroundColor='var(--primary)';this.style.color='white';"
                                        onmouseleave="this.style.backgroundColor='white';this.style.color='var(--primary)';">
                                        <i class="fa-solid fa-minus"></i>
                                    </button>
                                    <!-- Number circle -->
                                    <div id="preview-circle"
                                        class="w-16 h-16 rounded-full border-4 flex items-center justify-center transition-all bg-white shadow-inner"
                                        style="border-color: var(--primary);">
                                        <input type="number" id="preview-value"
                                            class="w-full h-full bg-transparent text-center font-black text-xl focus:outline-none"
                                            style="-moz-appearance: textfield; appearance: textfield; color: var(--primary);"
                                            value="0" min="0">
                                    </div>
                                    <!-- Plus button -->
                                    <button type="button" id="preview-plus"
                                        class="w-10 h-10 rounded-full border-2 flex items-center justify-center text-base transition-colors bg-white shadow-sm"
                                        style="border-color: var(--primary); color: var(--primary);"
                                        onmouseenter="this.style.backgroundColor='var(--primary)';this.style.color='white';"
                                        onmouseleave="this.style.backgroundColor='white';this.style.color='var(--primary)';">
                                        <i class="fa-solid fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                            <!-- Unit input -->
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2" for="habitUnit">Unit Label <span class="font-normal text-gray-500">(optional)</span></label>
                                <input type="text" id="habitUnit"
                                    class="w-full px-5 py-3 bg-white border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm"
                                    placeholder="e.g., glasses, pages, reps">
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Right Column -->
        <div class="w-5/12 flex flex-col gap-6 pr-4">
            <div class="bg-white/80 backdrop-blur rounded-[2rem] p-8 shadow-sm border border-gray-100/50 flex flex-col gap-8 mt-4 mb-8 h-full animate-slide-up delay-100">
                <form id="edit-habit-form" class="flex flex-col gap-6 h-full">
                    <!-- Define Your Habit -->
                    <section class="flex-1">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Define Your Habit</h2>
                        <div class="flex flex-col gap-5">
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2" for="habitName">Habit Name</label>
                                <input type="text" id="habitName" required class="w-full px-5 py-4 bg-white border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm" placeholder="e.g., Drink Water">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2" for="habitGoals">Goals</label>
                                <input type="text" id="habitGoals" required class="w-full px-5 py-4 bg-white border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm" placeholder="e.g., 8 glasses daily">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-2" for="habitDescription">Description</label>
                                <textarea id="habitDescription" required class="w-full px-5 py-4 bg-white border border-gray-200 rounded-xl text-base focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition shadow-sm h-32 resize-none" placeholder="Add some details about your habit..."></textarea>
                            </div>
                        </div>
                    </section>

                    <!-- Submit Button -->
                    <div class="pt-4 pb-2 mt-auto">
                        <button type="submit" class="w-full py-5 text-white font-black text-xl rounded-2xl shadow-lg transform transition hover:-translate-y-1 active:translate-y-0 theme-bg-update" style="background-color: var(--primary);">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wait slightly for app.js theme to load
            setTimeout(() => {
                 updateLocalColors(document.documentElement.getAttribute('data-theme') || 'green');
            }, 50);
            
            document.addEventListener('themeChanged', (e) => {
                updateLocalColors(e.detail.theme);
            });

            // Category Selection
            const catBtns = document.querySelectorAll('.category-btn');
            const customDetails = document.getElementById('custom-category-details');
            
            catBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    catBtns.forEach(b => {
                        b.classList.remove('active');
                        b.style.backgroundColor = '';
                        b.style.borderColor = '';
                    });
                    
                    btn.classList.add('active');
                    
                    const theme = document.documentElement.getAttribute('data-theme') || 'green';
                    const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                    
                    btn.style.backgroundColor = primary;
                    btn.style.borderColor = primary;
                    
                    if(btn.dataset.cat === 'custom') {
                        customDetails.classList.remove('hidden');
                        customDetails.classList.add('flex');
                    } else {
                        customDetails.classList.add('hidden');
                        customDetails.classList.remove('flex');
                    }
                });
            });

            if(catBtns.length > 0) catBtns[0].click();

            // Custom Icon Selection
            const iconBtns = document.querySelectorAll('.icon-btn');
            iconBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    iconBtns.forEach(b => {
                        b.classList.remove('active');
                        b.style.backgroundColor = '';
                        b.style.borderColor = '';
                        b.style.color = '';
                    });
                    btn.classList.add('active');
                    
                    const theme = document.documentElement.getAttribute('data-theme') || 'green';
                    const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                    
                    btn.style.backgroundColor = primary;
                    btn.style.borderColor = primary;
                    btn.style.color = 'white';
                });
            });

            if(iconBtns.length > 0) iconBtns[0].click(); // Activate first icon

            // Evaluation method highlighting + preview widget toggle
            const evalOptions = document.querySelectorAll('.evaluation-option');
            const evalPreview = document.getElementById('eval-preview');
            const numericPreview = document.getElementById('numeric-preview');

            // Preview counter state
            let previewCount = 0;
            const previewValueEl = document.getElementById('preview-value');
            const previewCircle = document.getElementById('preview-circle');

            function updatePreviewCircle(val) {
                previewCount = Math.max(0, val);
                previewValueEl.value = previewCount;
                if (previewCount > 0) {
                    previewCircle.style.backgroundColor = 'var(--primary)';
                    previewValueEl.style.color = 'white';
                } else {
                    previewCircle.style.backgroundColor = '';
                    previewValueEl.style.color = 'var(--primary)';
                }
            }

            document.getElementById('preview-minus').addEventListener('click', () => updatePreviewCircle(previewCount - 1));
            document.getElementById('preview-plus').addEventListener('click', () => updatePreviewCircle(previewCount + 1));
            previewValueEl.addEventListener('input', () => {
                const v = parseInt(previewValueEl.value) || 0;
                updatePreviewCircle(v);
            });

            const updateEvalColors = () => {
                const theme = document.documentElement.getAttribute('data-theme') || 'green';
                const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
                const lightPrimary = theme === 'blue' ? '#f0f9ff' : '#f0fdf4';
                
                evalOptions.forEach(opt => {
                    const input = opt.querySelector('input');
                    const innerBorder = opt.querySelector('.border-target');
                    
                    if(input.checked) {
                        opt.style.borderColor = primary;
                        opt.style.backgroundColor = lightPrimary;
                        if(innerBorder) innerBorder.style.borderColor = primary;
                    } else {
                        opt.style.borderColor = '';
                        opt.style.backgroundColor = '';
                        if(innerBorder) innerBorder.style.borderColor = '';
                    }
                });

                // Show/hide preview widget
                const selectedEval = document.querySelector('.evaluation-option input:checked')?.value;
                if (selectedEval === 'numeric') {
                    evalPreview.classList.remove('hidden');
                    numericPreview.classList.remove('hidden');
                    updatePreviewCircle(previewCount);
                } else {
                    evalPreview.classList.add('hidden');
                    numericPreview.classList.add('hidden');
                }
            };

            evalOptions.forEach(opt => {
                opt.querySelector('input').addEventListener('change', updateEvalColors);
            });
            setTimeout(updateEvalColors, 50);

            // Fetch habit data if ID is passed
            const urlParams = new URLSearchParams(window.location.search);
            const habitId = urlParams.get('id');
            let editingHabit = null;

            if (habitId) {
                const habits = JSON.parse(localStorage.getItem('habits') || '[]');
                editingHabit = habits.find(h => h.id === habitId);
                
                if (editingHabit) {
                    // Fill inputs
                    document.getElementById('habitName').value = editingHabit.name || '';
                    document.getElementById('habitGoals').value = editingHabit.goals || '';
                    document.getElementById('habitDescription').value = editingHabit.description || '';
                    if (editingHabit.unit) {
                        const unitEl = document.getElementById('habitUnit');
                        if(unitEl) unitEl.value = editingHabit.unit;
                    }

                    // Select evaluation
                    const evalInput = document.querySelector(`.evaluation-option input[value="${editingHabit.evaluation}"]`);
                    if (evalInput) evalInput.checked = true;
                    updateEvalColors();

                    // Select category natively or via custom logic
                    // This is simple: just map common categories lowercase
                    let catMatched = false;
                    catBtns.forEach(btn => {
                        if (btn.dataset.cat.toLowerCase() === editingHabit.category.toLowerCase()) {
                            btn.click();
                            catMatched = true;
                        }
                    });
                    
                    if (!catMatched) {
                        const customBtn = document.querySelector('.category-btn[data-cat="custom"]');
                        if (customBtn) customBtn.click();
                        document.getElementById('custom-cat-name').value = editingHabit.category;
                        // Try matching icon
                        const htmlString = editingHabit.iconHtml;
                        const iconMatch = htmlString && htmlString.match(/fa-([a-z-]+)/);
                        if(iconMatch) {
                            const iconClass = `fa-${iconMatch[1]}`;
                            const iconBtn = document.querySelector(`.icon-btn[data-icon="${iconClass}"]`);
                            if(iconBtn) iconBtn.click();
                        }
                    }
                }
            }

            // Submission logic
            document.getElementById('edit-habit-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!editingHabit) {
                    showToast("Habit ID missing or invalid!", "error");
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }

                const btn = e.target.querySelector('button[type="submit"]');
                const originalContent = btn.innerHTML;
                
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                btn.disabled = true;

                // Gather data
                const activeCatBtn = document.querySelector('.category-btn.active');
                const catType = activeCatBtn ? activeCatBtn.dataset.cat : 'study';
                let catName = activeCatBtn ? activeCatBtn.querySelector('span').innerText : 'Study';
                let catIconHTML = activeCatBtn ? activeCatBtn.querySelector('div').innerHTML : '<i class="fa-solid fa-book"></i>';
                
                // If custom
                if (catType === 'custom') {
                    const customNameVal = document.getElementById('custom-cat-name').value;
                    if (customNameVal) catName = customNameVal;
                    const activeIconBtn = document.querySelector('.icon-btn.active');
                    if (activeIconBtn) catIconHTML = activeIconBtn.innerHTML;
                }

                const evalType = document.querySelector('.evaluation-option input:checked').value;
                const habitName = document.getElementById('habitName').value;
                const habitGoals = document.getElementById('habitGoals').value;
                const habitDesc = document.getElementById('habitDescription').value;
                const habitUnit = document.getElementById('habitUnit')?.value || '';

                // Update habit object
                editingHabit.name = habitName;
                editingHabit.goals = habitGoals;
                editingHabit.description = habitDesc;
                editingHabit.category = catName;
                editingHabit.iconHtml = catIconHTML;
                editingHabit.evaluation = evalType;
                editingHabit.unit = habitUnit;

                // Update in Supabase using UUID
                await updateHabitInAPI(editingHabit.id, editingHabit);

                // Update localStorage cache
                const existingHabits = getHabits();
                const idx = existingHabits.findIndex(h => h.id === editingHabit.id);
                if (idx !== -1) {
                    existingHabits[idx] = editingHabit;
                    saveHabitsCache(existingHabits);
                }

                setTimeout(() => {
                    showToast("Habit updated successfully!");
                    setTimeout(() => window.location.href = "index.html", 1000);
                }, 300);
            });
        });

        function updateLocalColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const lightPrimary = theme === 'blue' ? '#f0f9ff' : '#f0fdf4';
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            
            const activeCat = document.querySelector('.category-btn.active');
            if (activeCat) {
                activeCat.style.backgroundColor = primary;
                activeCat.style.borderColor = primary;
            }
            
            const activeIcon = document.querySelector('.icon-btn.active');
            if (activeIcon) {
                activeIcon.style.backgroundColor = primary;
                activeIcon.style.borderColor = primary;
            }

            document.querySelectorAll('.evaluation-option input:checked').forEach(input => {
                const opt = input.closest('.evaluation-option');
                opt.style.borderColor = primary;
                opt.style.backgroundColor = lightPrimary;
                
                const innerBorder = opt.querySelector('.border-target');
                if(innerBorder) innerBorder.style.borderColor = primary;
            });
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(theme === 'blue' ? 'focus:ring-blue-500' : 'focus:ring-green-500');
            });
        }
    </script>
</body>
</html>
