<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    (function() {
        const savedTheme = localStorage.getItem('theme');

        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    })();
    </script>
    <title>Statistics - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ux-tracker.js"></script>
    <link rel="stylesheet" href="../css/tailwind.css">
    <link rel="stylesheet" href="../css/styles.css">
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981' },
                        blue: { 500: '#5BA4C9' }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">
        <!-- Desktop Sidebar -->
    <aside class="desktop-sidebar">
        <!-- Logo -->
        <div class="mb-10 mt-2">
            <img src="../assets/Xhabit logo.jpg" alt="Xhabit Logo" class="w-12 h-12 object-contain rounded-xl">
        </div>
        
        <!-- Nav items -->
        <nav class="flex flex-col gap-4 flex-1 w-full items-center">
            <a href="index.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="calendar.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-regular fa-calendar text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Calendar</span>
            </a>
            <a href="statistics.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 bg-[#C6F2DE] text-emerald-600 rounded-2xl transition-all shadow-sm">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Stats</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-regular fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>
        
        <!-- Add Button -->
        <div class="mb-4">
            <a href="add_habit.html" class="w-12 h-12 bg-emerald-400 text-white rounded-full flex items-center justify-center text-xl shadow-lg hover:scale-105 hover:bg-emerald-500 transition-all">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content-wrapper p-8 flex gap-10 w-full overflow-y-auto">
        <!-- Left Column -->
        <div class="w-7/12 flex flex-col gap-3 pl-4">
            
            <!-- Header -->
            <header class="flex justify-between items-center animate-slide-up mt-2 bg-white/50 backdrop-blur rounded-[2rem] p-5 shadow-sm">
                <h1 class="text-3xl font-extrabold text-gray-900 dark:text-slate-100 tracking-tight">Statistics</h1>
                <button onclick="toggleTheme()" class="relative w-12 h-12 bg-white/50 dark:bg-gray-800/50 backdrop-blur rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-gray-700 transition-all shadow-sm border border-gray-100 dark:border-gray-700">
                    <i class="fa-solid fa-moon text-gray-600 dark:hidden text-lg"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
                </button>
            </header>

            <!-- Time Period Tabs -->
            <section class="animate-slide-up delay-100 w-full mt-2">
                <div class="flex bg-white/50 backdrop-blur-md border border-white/80 p-1.5 rounded-full w-full shadow-sm max-w-md" id="period-tabs">
                    <button onclick="setStatPeriod('daily')" class="flex-1 py-2 text-sm font-semibold rounded-full bg-white shadow-sm text-emerald-600 transition-all active-tab">Daily</button>
                    <button onclick="setStatPeriod('weekly')" class="flex-1 py-2 text-sm font-medium rounded-full text-gray-500 hover:text-gray-900 transition-all">Weekly</button>
                    <button onclick="setStatPeriod('monthly')" class="flex-1 py-2 text-sm font-medium rounded-full text-gray-500 hover:text-gray-900 transition-all">Monthly</button>
                </div>
            </section>

            <!-- Overview Cards -->
            <section class="flex gap-4 animate-slide-up delay-200 mt-1">
                <div class="flex-1 bg-white/80 backdrop-blur rounded-[2rem] p-5 shadow-sm border border-gray-100/50 flex flex-col items-center text-center">
                    <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-500 justify-center items-center flex mb-3 text-xl shadow-sm">
                        <i class="fa-solid fa-fire"></i>
                    </div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Longest Streak</p>
                    <h3 id="streak-value" class="text-2xl font-black text-gray-900 mt-1">0 Days</h3>
                </div>
                <div class="flex-1 bg-white/80 backdrop-blur rounded-[2rem] p-5 shadow-sm border border-gray-100/50 flex flex-col items-center text-center">
                    <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-500 justify-center items-center flex mb-3 text-xl shadow-sm" id="completion-icon-wrapper">
                        <i class="fa-solid fa-trophy"></i>
                    </div>
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Completion</p>
                    <h3 id="completion-value" class="text-2xl font-black text-gray-900 mt-1">0%</h3>
                </div>
            </section>

            <!-- Main Chart -->
            <section class="animate-slide-up delay-300 mt-1 mb-4">
                <div class="bg-white/80 backdrop-blur rounded-[2rem] p-5 shadow-sm border border-gray-100/50">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <h2 class="text-lg font-bold text-gray-900">Activity</h2>
                            <p class="text-xs text-gray-500 font-medium" id="activity-subtitle">Since Apr 2026</p>
                        </div>
                    </div>
                    <div class="h-56 relative w-full">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>
            </section>
        </div>

        <!-- Right Column -->
        <div class="w-5/12 flex flex-col gap-6 pr-4">
            <!-- Category Distribution -->
            <section class="animate-slide-up delay-400 mt-4">
                <h2 class="text-xl font-bold text-gray-900 mb-4 px-2">Category Distribution</h2>
                <div class="bg-white/80 backdrop-blur rounded-[2rem] p-6 shadow-sm border border-gray-100/50 flex flex-col items-center justify-between min-h-[200px]">
                    <div class="w-full relative h-40 flex justify-center mb-6">
                        <canvas id="categoryChart"></canvas>
                    </div>
                    <div id="category-legend" class="w-full flex flex-col gap-3">
                        <!-- Dynamically populated -->
                    </div>
                </div>
            </section>

            <!-- Insights & Reports -->
            <section class="animate-slide-up delay-400 flex flex-col mb-8">
                <h2 class="text-xl font-bold text-gray-900 mb-4 px-2">Key Insights</h2>
                <div class="bg-white/80 backdrop-blur rounded-[2rem] p-6 shadow-sm border border-gray-100/50 min-h-[200px]">
                    <ul id="insights-list" class="space-y-4">
                        <!-- Dynamically populated -->
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let activityChartInstance = null;
        let categoryChartInstance = null;
        
        function getThemeColors() {
            const style = getComputedStyle(document.body);
            return {
                primary: style.getPropertyValue('--primary').trim() || '#10B981',
                primaryLight: style.getPropertyValue('--primary-light').trim() || '#D1FAE5',
                accent: style.getPropertyValue('--accent').trim() || '#34D399'
            };
        }

        function initCharts(period = 'daily') {
            const colors = getThemeColors();
            const stats = getStatsData(period);
            
            // Adjust Completion Icon color Based on Theme
            const completionWrapper = document.getElementById('completion-icon-wrapper');
            if (completionWrapper) {
                 completionWrapper.style.backgroundColor = colors.primaryLight;
                 completionWrapper.style.color = colors.primary;
            }

            // Update overview cards with real data
            document.getElementById('streak-value').textContent = `${stats.longestStreak} Days`;
            document.getElementById('completion-value').textContent = `${stats.completionRate}%`;
            
            // Account opening date
            const loginDate = getLoginDate();
            const loginObj = new Date(loginDate);
            document.getElementById('activity-subtitle').innerText = `Since ${loginObj.toLocaleString('default', { month: 'short', year: 'numeric' })}`;

            // Activity Bar Chart
            const ctxActivity = document.getElementById('activityChart').getContext('2d');
            
            if (activityChartInstance) activityChartInstance.destroy();
            
            activityChartInstance = new Chart(ctxActivity, {
                type: 'bar',
                data: {
                    labels: stats.labels,
                    datasets: [{
                        label: 'Completion',
                        data: stats.data,
                        backgroundColor: colors.primary,
                        borderRadius: 6,
                        borderSkipped: false,
                        barThickness: period === 'monthly' ? 16 : 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111827',
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) { return context.raw + '%'; }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: '#F3F4F6', drawBorder: false },
                            border: { display: false },
                            ticks: { display: false }
                        },
                        x: {
                            grid: { display: false, drawBorder: false },
                            border: { display: false },
                            ticks: { color: '#9CA3AF', font: { family: 'Inter', size: 11, weight: '500' } }
                        }
                    }
                }
            });

            // Category Doughnut Chart — from real data
            const ctxCategory = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChartInstance) categoryChartInstance.destroy();

            const catEntries = Object.entries(stats.catCounts);
            const catLabels = catEntries.length > 0 ? catEntries.map(e => e[0]) : ['No data'];
            const catData = catEntries.length > 0 ? catEntries.map(e => e[1]) : [1];
            
            // Generate colors for each category
            const paletteColors = [colors.primary, colors.accent, '#F59E0B', '#8B5CF6', '#EF4444', '#EC4899', '#14B8A6', '#6366F1', '#E5E7EB'];
            const catColors = catLabels.map((_, i) => paletteColors[i % paletteColors.length]);

            // Update legend
            const legendContainer = document.getElementById('category-legend');
            if (legendContainer) {
                legendContainer.innerHTML = catLabels.map((label, i) => `
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full shrink-0" style="background-color: ${catColors[i]}"></span>
                        <span class="text-sm font-medium text-gray-700 truncate">${label}</span>
                    </div>
                `).join('');
            }
            
            categoryChartInstance = new Chart(ctxCategory, {
                type: 'doughnut',
                data: {
                    labels: catLabels,
                    datasets: [{
                        data: catData,
                        backgroundColor: catColors,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111827',
                            padding: 10,
                            displayColors: true
                        }
                    }
                }
            });
            
            // Generate Insights
            generateInsights(stats, period);
        }

        function generateInsights(stats, period) {
            const list = document.getElementById('insights-list');
            if (!list) return;
            list.innerHTML = '';
            
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            const isBlue = theme === 'blue';
            
            // 1. Trend Insight
            if (stats.data.length > 1) {
                const last = stats.data[stats.data.length - 1];
                const prev = stats.data[stats.data.length - 2];
                let diff = last - prev;
                let trendMsg = diff >= 0 
                    ? `<span class="${isBlue ? 'text-[#5BA4C9]' : 'text-[#10B981]'} font-bold"><i class="fa-solid fa-arrow-trend-up mr-1"></i> Up ${diff}%</span> from previous period.`
                    : `<span class="text-red-500 font-bold"><i class="fa-solid fa-arrow-trend-down mr-1"></i> Down ${Math.abs(diff)}%</span> from previous period. Keep pushing!`;
                addInsight(list, "Performance Trend", trendMsg, 'fa-chart-line', 'primary');
            }

            // 2. Category Focus
            const catEntries = Object.entries(stats.catCounts);
            if (catEntries.length > 0) {
                catEntries.sort((a,b) => b[1] - a[1]);
                const bestCat = catEntries[0][0];
                addInsight(list, "Primary Focus Area", `Most of your habits belong to the <b>${bestCat}</b> category.`, 'fa-bullseye', 'orange');
            }
            
            // 3. Consistency
            if (stats.longestStreak > 2) {
                addInsight(list, "Strong Consistency", `You reached a ${stats.longestStreak}-day perfect streak. Outstanding!`, 'fa-fire', 'red');
            } else {
                addInsight(list, "Building Consistency", "Try linking a new habit to an existing routine to build a streak.", 'fa-lightbulb', 'yellow');
            }
        }

        function addInsight(list, title, msg, iconClass, colorMode) {
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            let iconBg = theme === 'blue' ? 'bg-blue-50 text-[#5BA4C9]' : 'bg-green-50 text-[#10B981]';
            if(colorMode === 'orange') iconBg = 'bg-orange-50 text-orange-500';
            if(colorMode === 'yellow') iconBg = 'bg-yellow-50 text-yellow-500';
            if(colorMode === 'red') iconBg = 'bg-red-50 text-red-500';

            list.innerHTML += `
                <li class="flex gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100 items-start shadow-sm transition-transform hover:-translate-y-0.5">
                    <div class="w-10 h-10 rounded-full flex shrink-0 items-center justify-center text-lg ${iconBg}">
                        <i class="fa-solid ${iconClass}"></i>
                    </div>
                    <div>
                        <h4 class="text-gray-900 font-bold mb-1 text-sm">${title}</h4>
                        <p class="text-xs text-gray-500 leading-snug">${msg}</p>
                    </div>
                </li>
            `;
        }
        
        // Handle Tab Swapping
        let currentPeriod = 'daily';
        function setStatPeriod(newPeriod) {
            currentPeriod = newPeriod;
            
            // Update UI tabs
            const tabs = document.getElementById('period-tabs').querySelectorAll('button');
            const themeColors = getThemeColors();
            
            tabs.forEach(tab => {
                if(tab.innerText.toLowerCase() === newPeriod) {
                    tab.className = `flex-1 py-2 text-sm font-semibold rounded-full bg-white shadow-sm transition-all active-tab`;
                    tab.style.color = themeColors.primary;
                } else {
                    tab.className = `flex-1 py-2 text-sm font-medium rounded-full text-gray-500 hover:text-gray-900 transition-all`;
                    tab.style.color = '';
                }
            });
            
            // Re-init chart with new data
            initCharts(newPeriod);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Sync habits from API before rendering charts
            await syncHabitsFromAPI();
            initCharts(currentPeriod);
            
            // Re-render charts when theme changes
            document.addEventListener('themeChanged', () => {
                setTimeout(() => {
                    const activeTab = document.querySelector('.active-tab');
                    if (activeTab) {
                        const themeColors = getThemeColors();
                        activeTab.style.color = themeColors.primary;
                    }
                    initCharts(currentPeriod);
                }, 100);
            });
        });
    </script>
</body>
</html>
