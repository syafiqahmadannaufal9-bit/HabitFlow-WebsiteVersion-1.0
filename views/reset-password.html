<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <script src="../js/api.js"></script>
    <script src="../js/security.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 600: '#059669' }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-sm border border-gray-100 animate-slide-up relative overflow-hidden">

        <!-- Decorative blob -->
        <div class="absolute -top-16 -right-16 w-32 h-32 rounded-full opacity-10 theme-bg-update"
            style="background-color: var(--primary, #10B981);"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-3xl mb-4 theme-text-update theme-bg-light"
                style="color: var(--primary, #10B981); background-color: var(--primary-light, #D1FAE5);">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Create New Password</h1>
            <p class="text-sm text-gray-500 mt-2">Please enter your new password below.</p>
        </div>

        <form class="flex flex-col gap-4 relative z-10" id="reset-password-form">
            <input type="hidden" id="token">

            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="new_password">New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-key text-gray-400"></i>
                    </div>
                    <input type="password" id="new_password"
                        class="w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition"
                        placeholder="••••••••" required>
                    <button type="button" onclick="togglePasswordVisibility('new_password', 'password-toggle-icon')"
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition">
                        <i id="password-toggle-icon" class="fa-regular fa-eye"></i>
                    </button>
                </div>
                <!-- Password Strength Meter -->
                <div class="mt-2 px-1">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-medium text-gray-500 uppercase tracking-wider">Password Strength</span>
                        <span id="strength-text" class="text-[10px] font-bold text-gray-400">Poor</span>
                    </div>
                    <div class="flex gap-1 h-1">
                        <div id="strength-bar-1" class="flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                        <div id="strength-bar-2" class="flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                        <div id="strength-bar-3" class="flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                        <div id="strength-bar-4" class="flex-1 rounded-full bg-gray-200 transition-colors duration-300"></div>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1 ml-1" for="confirm_password">Confirm New Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-check-double text-gray-400"></i>
                    </div>
                    <input type="password" id="confirm_password"
                        class="w-full pl-11 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:border-transparent theme-focus-ring transition"
                        placeholder="••••••••" required>
                    <button type="button" onclick="togglePasswordVisibility('confirm_password', 'confirm-toggle-icon')"
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition">
                        <i id="confirm-toggle-icon" class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full py-3 mt-4 text-white font-bold rounded-xl shadow-md transform transition hover:-translate-y-0.5 active:translate-y-0 theme-bg-update flex justify-center items-center gap-2"
                style="background-color: var(--primary, #10B981);">
                <span>Save New Password</span>
            </button>
            
            <div id="status-message" class="hidden mt-4 p-3 rounded-xl text-sm text-center"></div>
        </form>

    </div>

    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = localStorage.getItem('theme') || 'green';
            updateThemeColors(currentTheme);

            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('token');
            const statusMsg = document.getElementById('status-message');

            if (urlToken) {
                document.getElementById('token').value = urlToken;
            }

            const pwdInput = document.getElementById('new_password');
            if (pwdInput && typeof setupPasswordStrengthMeter === 'function') {
                setupPasswordStrengthMeter('new_password', 'strength-bar-1', 'strength-bar-2', 'strength-bar-3', 'strength-bar-4', 'strength-text');
            }

            document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const token = document.getElementById('token').value.trim();
                const new_password = document.getElementById('new_password').value;
                const confirm_password = document.getElementById('confirm_password').value;

                if (!new_password || !token) {
                    statusMsg.classList.remove('hidden');
                    statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                    statusMsg.innerText = 'Token and password are required. Make sure you clicked the link from your email.';
                    return;
                }

                if (new_password !== confirm_password) {
                    statusMsg.classList.remove('hidden');
                    statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                    statusMsg.innerText = 'Passwords do not match!';
                    return;
                }

                if (typeof validatePassword === 'function') {
                    const pwdResult = validatePassword(new_password);
                    if (!pwdResult.isValid) {
                        statusMsg.classList.remove('hidden');
                        statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                        statusMsg.innerText = 'Password does not meet security requirements:\n• ' + pwdResult.errors.join('\n• ');
                        return;
                    }
                }

                const submitBtn = document.getElementById('submit-btn');
                const originalBtnText = submitBtn.innerHTML;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                statusMsg.classList.add('hidden');

                try {
                    const { data, error } = await window.apiClient.post('/auth/reset-password', { token, new_password });
                    
                    statusMsg.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200');
                    if (!error) {
                        statusMsg.classList.add('bg-green-50', 'text-green-600', 'border', 'border-green-200');
                        statusMsg.innerText = data.message || 'Password successfully reset! Redirecting to login...';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                        statusMsg.innerText = error.message || error || 'Failed to reset password.';
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalBtnText;
                    }
                } catch (err) {
                    statusMsg.classList.remove('hidden');
                    statusMsg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                    statusMsg.innerText = 'Network error. Please try again.';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            });
        });

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function updateThemeColors(theme) {
            const primary = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const primaryLight = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            
            document.documentElement.style.setProperty('--primary', primary);
            document.documentElement.style.setProperty('--primary-light', primaryLight);
            
            document.querySelectorAll('.theme-bg-update').forEach(el => el.style.backgroundColor = primary);
            document.querySelectorAll('.theme-text-update').forEach(el => el.style.color = primary);
            document.querySelectorAll('.theme-bg-light').forEach(el => el.style.backgroundColor = primaryLight);
            
            document.querySelectorAll('.theme-focus-ring').forEach(el => {
                el.classList.remove('focus:ring-green-500', 'focus:ring-blue-500');
                el.classList.add(`focus:ring-${theme === 'blue' ? 'blue' : 'green'}-500`);
            });
        }
    </script>
</body>
</html>
