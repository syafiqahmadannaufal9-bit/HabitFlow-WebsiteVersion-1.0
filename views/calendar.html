<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/tailwind.css">
    <link rel="stylesheet" href="../css/styles.css">
    <script src="../js/api.js"></script>
    <script src="../js/ux-tracker.js"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        green: { 500: '#10B981', 100: '#D1FAE5' },
                        blue: { 500: '#5BA4C9', 100: '#E0F2FE' }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-gray-800 dark:text-gray-100 transition-colors duration-300">
        <!-- Desktop Sidebar -->
    <aside class="desktop-sidebar">
        <!-- Logo -->
        <div class="mb-10 mt-2">
            <img src="../assets/Logo Xhabit.png" alt="Xhabit Logo" class="w-12 h-12 object-contain rounded-xl">
        </div>
        
        <!-- Nav items -->
        <nav class="flex flex-col gap-4 flex-1 w-full items-center">
            <a href="index.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Home</span>
            </a>
            <a href="calendar.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 bg-[#C6F2DE] text-emerald-600 rounded-2xl transition-all shadow-sm">
                <i class="fa-regular fa-calendar text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Calendar</span>
            </a>
            <a href="statistics.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Stats</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center justify-center gap-1 w-16 h-16 text-gray-400 hover:text-emerald-600 hover:bg-gray-50 rounded-2xl transition-all ">
                <i class="fa-regular fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>
        
        <!-- Add Button -->
        <div class="mb-4">
            <a href="add_habit.html" class="w-12 h-12 bg-emerald-400 text-white rounded-full flex items-center justify-center text-xl shadow-lg hover:scale-105 hover:bg-emerald-500 transition-all">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content-wrapper p-8 flex gap-10 w-full overflow-y-auto">
        <!-- Left Column -->
        <div class="w-2/3 flex flex-col gap-6 pl-4">
            <!-- Header -->
            <header class="flex justify-between items-center animate-slide-up mt-4 bg-white/50 backdrop-blur rounded-[2rem] p-6 shadow-sm">
                <h1 class="text-3xl font-extrabold text-gray-900 dark:text-slate-100 tracking-tight">Calendar</h1>
                <button onclick="toggleTheme()" class="relative w-12 h-12 bg-white/50 dark:bg-gray-800/50 backdrop-blur rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-gray-700 transition-all shadow-sm border border-gray-100 dark:border-gray-700">
                    <i class="fa-solid fa-moon text-gray-600 dark:hidden text-lg"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400 text-lg"></i>
                </button>
            </header>

            <!-- Month Navigation -->
            <section class="flex justify-between items-center animate-slide-up delay-100 bg-white/50 backdrop-blur rounded-[2rem] p-4 shadow-sm">
                <button id="cal-prev" class="w-12 h-12 rounded-full flex items-center justify-center text-gray-600 hover:bg-white transition bg-transparent shadow-sm">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <h2 id="cal-month-title" class="text-2xl font-bold text-gray-900">April 2026</h2>
                <button id="cal-next" class="w-12 h-12 rounded-full flex items-center justify-center text-gray-600 hover:bg-white transition bg-transparent shadow-sm">
                    <i class="fa-solid fa-chevron-right text-lg"></i>
                </button>
            </section>

            <!-- Calendar Grid -->
            <section class="animate-slide-up delay-200">
                <div class="bg-white/80 backdrop-blur rounded-[2rem] p-8 shadow-sm border border-gray-100/50">
                    <!-- Days of week -->
                    <div class="grid grid-cols-7 gap-4 mb-6 text-center">
                        <span class="text-sm font-bold text-gray-400">SUN</span>
                        <span class="text-sm font-bold text-gray-400">MON</span>
                        <span class="text-sm font-bold text-gray-400">TUE</span>
                        <span class="text-sm font-bold text-gray-400">WED</span>
                        <span class="text-sm font-bold text-gray-400">THU</span>
                        <span class="text-sm font-bold text-gray-400">FRI</span>
                        <span class="text-sm font-bold text-gray-400">SAT</span>
                    </div>
                    
                    <!-- Dates -->
                    <div class="grid grid-cols-7 gap-y-6 gap-x-4 text-center" id="calendar-grid">
                        <!-- Javascript will populate this -->
                    </div>
                </div>
            </section>
        </div>

        <!-- Right Column -->
        <div class="w-1/3 flex flex-col gap-6 pr-4">
            <!-- Selected Date Summary -->
            <section class="animate-slide-up delay-300 bg-white/50 backdrop-blur rounded-[2rem] p-8 shadow-sm flex flex-col flex-1 mt-4 mb-8">
                <h3 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-200 pb-4" id="selected-date-text">March 11, 2026</h3>
                
                <div id="calendar-habit-list" class="flex flex-col gap-4 overflow-y-auto custom-scrollbar pr-2">
                    <!-- Dynamically populated by app.js -->
                </div>
            </section>
        </div>
    </main>

    <script src="../js/habits.js"></script>
    <script src="../js/app.js"></script>
    <script>
        let calYear, calMonth, calSelectedDay;

        document.addEventListener('DOMContentLoaded', async () => {
            getLoginDate();
            const now = new Date();
            calYear = now.getFullYear();
            calMonth = now.getMonth();
            calSelectedDay = now.getDate();

            // Sync habits from API before rendering
            await syncHabitsFromAPI();
            renderCalendarFull();

            // Month navigation
            document.getElementById('cal-prev').addEventListener('click', () => {
                calMonth--;
                if (calMonth < 0) { calMonth = 11; calYear--; }
                calSelectedDay = null;
                renderCalendarFull();
            });
            document.getElementById('cal-next').addEventListener('click', () => {
                calMonth++;
                if (calMonth > 11) { calMonth = 0; calYear++; }
                calSelectedDay = null;
                renderCalendarFull();
            });

            document.addEventListener('themeChanged', () => {
                renderCalendarFull();
            });
        });

        function renderCalendarFull() {
            const theme = document.documentElement.getAttribute('data-theme') || 'green';
            const primaryColor = theme === 'blue' ? '#5BA4C9' : '#10B981';
            const lightColor = theme === 'blue' ? '#E0F2FE' : '#D1FAE5';
            const today = new Date();
            const todayStr = today.toISOString().slice(0, 10);

            // Month title
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('cal-month-title').textContent = `${monthNames[calMonth]} ${calYear}`;

            // Calendar grid
            const grid = document.getElementById('calendar-grid');
            const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

            const habits = getHabits();
            const completions = getCompletions();
            const loginDate = getLoginDate();

            let html = '';
            // Empty cells
            for (let i = 0; i < firstDay; i++) {
                html += '<div></div>';
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(calYear, calMonth, d);
                const dateStr = dateObj.toISOString().slice(0, 10);
                const isToday = dateStr === todayStr;
                const isSelected = d === calSelectedDay;
                const isPast = dateObj <= today;
                const isFuture = dateStr > todayStr;

                let classes = 'calendar-day w-8 h-8 rounded-full flex items-center justify-center mx-auto text-sm font-medium transition-all cursor-pointer hover:scale-110 relative';

                let style = '';
                if (isSelected) {
                    classes += ' text-white shadow-md';
                    style = `background-color: ${primaryColor};`;
                } else if (isToday) {
                    classes += ' text-white';
                    style = `background-color: ${primaryColor}; opacity: 0.7;`;
                } else if (isFuture) {
                    classes += ' text-gray-400';
                } else {
                    classes += ' text-gray-700 bg-gray-50';
                }

                // Red dot for dates with incomplete habits
                let dotHtml = '';
                if (habits.length > 0 && dateStr >= loginDate && dateStr <= todayStr) {
                    const allCompleted = habits.every(h => completions[dateStr] && completions[dateStr][h.id]);
                    if (!allCompleted) {
                        dotHtml = '<span class="cal-red-dot absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-red-500 rounded-full"></span>';
                    }
                }

                html += `<div class="${classes}" style="${style}" data-date="${dateStr}" data-day="${d}" onclick="selectCalDate(${d})">${d}${dotHtml}</div>`;
            }

            grid.innerHTML = html;

            // Render selected date habits
            if (calSelectedDay) {
                const selDateStr = new Date(calYear, calMonth, calSelectedDay).toISOString().slice(0, 10);
                const selDate = new Date(calYear, calMonth, calSelectedDay);
                document.getElementById('selected-date-text').textContent = selDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                renderCalendarHabits(selDateStr);
            } else {
                document.getElementById('selected-date-text').textContent = `${monthNames[calMonth]} ${calYear}`;
                document.getElementById('calendar-habit-list').innerHTML = `
                    <div class="text-center py-6">
                        <p class="text-gray-400 text-sm">Select a date to view habits</p>
                    </div>`;
            }
        }

        function selectCalDate(day) {
            calSelectedDay = day;
            renderCalendarFull();
        }
    </script>
</body>
</html>
